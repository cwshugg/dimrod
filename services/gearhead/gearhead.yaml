service_name: gearhead
service_log: stdout
msghub_name: YOUR_MSGHUB_NAME
oracle:
  addr: 0.0.0.0
  port: 2363
  log: stdout
  auth_cookie: gearhead_auth
  auth_secret: YOUR_JWT_SECRET_HERE
  auth_users:
  - username: torque
    password: wrench
    privilege: 0

mileage_db:
  path: ./.gearhead.db

maintenance_log_db:
  path: ./.gearhead_maintenance_log.db

dialogue:
  openai_api_key: YOUR_OPENAI_KEY_HERE
  openai_chat_model: gpt-4o-mini

vehicles:
- id: civic_2020
  manufacturer: Honda
  year: 2020
  nicknames:
  - The Daily Driver
  - The Civic
  vin: 1HGBH41JXMN109186
  license_plate: ABC-1234
  properties:
  - key: engine_type
    nickname: Engine Type
    value: gasoline
  - key: horsepower
    nickname: Horsepower
    value: 158
  - key: oil_capacity
    nickname: Oil Capacity (quarts)
    value: 3.7
  - key: cylinders
    nickname: Cylinders
    value: 4
  - key: displacement
    nickname: Displacement (liters)
    value: 2.0
  - key: color
    nickname: Exterior Color
    value: Lunar Silver Metallic
  - key: trim
    nickname: Trim Level
    value: EX
  maintenance_tasks:
  - id: oil_change
    name: Oil Change
    description: Change engine oil and filter
    mileages: [5000, 10000, 15000, 20000, 25000, 30000, 35000, 40000, 45000, 50000]
  - id: tire_rotation
    name: Tire Rotation
    description: Rotate tires for even wear
    mileages: [7500, 15000, 22500, 30000, 37500, 45000]
  - id: brake_inspection
    name: Brake Inspection
    description: Inspect brake pads and rotors
    mileages: [15000, 30000, 45000, 60000]

- id: model3_2022
  manufacturer: Tesla
  year: 2022
  nicknames:
  - Sparky
  vin: 5YJ3E1EA1NF123456
  license_plate: EV-5678
  properties:
  - key: engine_type
    nickname: Engine Type
    value: electric
  - key: horsepower
    nickname: Horsepower
    value: 283
  - key: range_miles
    nickname: EPA Range
    value: 358
  - key: color
    nickname: Exterior Color
    value: Pearl White
  maintenance_tasks:
  - id: tire_rotation
    name: Tire Rotation
    description: Rotate tires for even wear
    mileages: [7500, 15000, 22500, 30000, 37500, 45000]
  - id: cabin_air_filter
    name: Cabin Air Filter
    description: Replace cabin air filter
    mileages: [25000, 50000, 75000, 100000]
  - id: brake_fluid
    name: Brake Fluid Check
    description: Check and replace brake fluid
    mileages: [25000, 50000, 75000, 100000]
  # Example datetime-triggered maintenance task (time-based scheduling).
  # The 'datetimes' field accepts a list of DatetimeTrigger objects with
  # optional fields: years, months (1-12), days (1-31), weekdays (0=Sun),
  # hours (0-23), minutes (0-59). Omitted fields act as wildcards.
  - id: annual_inspection
    name: Annual State Inspection
    description: Schedule annual state vehicle inspection
    datetimes:
    - months: [1]  # January each year
